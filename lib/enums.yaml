# Closed-set values for enum fields in the song schema. Each top-level
# key is the field name; under it:
#   - `desc` is the field-level description, surfaced as a tooltip on
#     the field label in the song view.
#   - `values` is a map from legal value (the raw frontmatter string)
#     to its user-facing description (the tooltip on the value link
#     and the right-hand side of the legend).
#
# Loaded by loadEnums() in song-schema.js into:
#   { <field>: { desc, values: { <key>: <description> } } }
# and exposed to templates as the `enums` global (eleventy.config.js).

# TODO: human readable names for e.g. "kids-song"
genre:
  values:
    - chantey
    - hymn
    - parody
    - kids-song
    - drinking-song
    - lullaby
    - spiritual
    - protest-song
    - satire

mood:
  values:
    - rousing
    - silly
    - uplifting
    - peaceful
    - spooky
    - sweet
    - melancholy
    - fun
    - badass
    - bawdy
    - sad

structure:
  values:
    chorus: it's a chorus.
    zipper: stays the same with one or two words changed (e.g. "oh mothers" / "oh fathers" or "when we work/play/sing together, we grow our village stronger")
    short-refrain: little refrain, shorter than true chorus # do i need this?
    repeat-line-you-listen-for: repeat a line of a verse (either as an answer in the verse, or as a chorus)
    call-and-response: call and response # redundant with repeat-line-you-listen-for?
    2nd-4th-lines-repeat: 1st and 3rd lines are different per verse but 2nd/4th are the same
    counting: verses count up or down (also applies to going through months, days of week etc.)
    refrain-lines: repeating line(s) interspersed with verse
#    round: it's a round.
#    layer: parts layer on each other
#    optional-chorus: chorus is optional


# Not for display(?), filtering only
known:
  desc: how well I personally know the song
  values:
    1: memorized
    2: once memorized / back of mind
    3: can lead off lyrics
    4: only vaguely know
    to-learn: n/a, want to learn

joiny_inny:
  desc: how easy it is to join in on this one in a vacuum (i.e. in a place where it isn't known)
  values:
    very_easy: suitable for non singers
    easy: easy in a pub sing context, e.g. simple chorus or repeated lines
    moderate: the bulk of pub sing songs
    hard: fast, wordy, Nancy Kerr bullshit etc.

# Bop-rating values are integers 1–5. js-yaml parses integer-looking
# keys as numbers, but JS object keys coerce to strings, so they read
# as "1".."5" once loaded — fine for the help-tooltip lookup and the
# legend formatting. The type check stays as isBopRating (passed via
# enumField's `check` override) so frontmatter still validates as
# integer, not string.
bop_rating:
  desc: energy of the song / how much of a bop it is, low -> high
  values:
    1: slow, sad, bring room down (e.g. Davy Cross)
    2: melancholy but non-tear-jerkers, or relaxed lullaby vibes (e.g. Grey Funnel Line, Oars and Row)
    3: middle of the road. May be gentle positivity or just kinda misc. (e.g. Cairo, Bonnet and Shawl, Lovely Agnes, East for the Winter)
    4: fun, zippy, engaging and/or groovy and badass (e.g. I Like to Rise, Death Came A-Knockin)
    5: certified banger, high-energy intensity (e.g. I Can Hew, Bringing In the Sheaves) or has the whole room losing their shit (e.g. Cow's Can't Swim, I've Got No Trousers On)